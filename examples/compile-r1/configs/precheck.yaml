# compile-r1 precheck config
# usage:
#   CONFIG_FILE=/mnt/workspace/jkh/slime/examples/compile-r1/configs/precheck.yaml \
#   bash /mnt/workspace/jkh/slime/examples/compile-r1/run_qwen2.5_3B.sh

BASE_DIR: "/mnt/workspace/jkh"
SLIME_DIR: "/mnt/workspace/jkh/slime"
MEGATRON_DIR: "/mnt/workspace/jkh/Megatron-LM"
COMPILE_R1_DIR: "/mnt/workspace/jkh/slime/examples/compile-r1"

MODEL_DIR: "/mnt/workspace/jkh/model/Qwen2.5-3B"
TRAIN_DATA: "/mnt/workspace/jkh/slime/examples/compile-r1/data/train"
TEST_DATA: "/mnt/workspace/jkh/slime/examples/compile-r1/data/test"

NUM_GPUS: 2
ROLLOUT_NUM_GPUS: 2
ROLLOUT_NUM_GPUS_PER_ENGINE: 1
TENSOR_MODEL_PARALLEL_SIZE: 1

NUM_ROLLOUT: 5
ROLLOUT_BATCH_SIZE: 4
N_SAMPLES_PER_PROMPT: 2
GLOBAL_BATCH_SIZE: 8
ROLLOUT_MAX_RESPONSE_LEN: 1024
ROLLOUT_TEMPERATURE: 1.0

EVAL_INTERVAL: 2
SAVE_INTERVAL: 2

COMPILE_R1_MAX_TURNS: 3
COMPILE_R1_TOOL_CONCURRENCY: 32
COMPILE_R1_TIMEOUT_SECONDS: 6
COMPILE_R1_MEMORY_MB: 768
COMPILE_R1_RETURN_LOGPROB: 1
COMPILE_R1_FORMAT_SCORE: 0.15
COMPILE_R1_TOOL_BONUS: 0.05
COMPILE_R1_SANDBOX_BACKEND: "runpytool"
COMPILE_R1_RUNPY_MAX_WORKERS: 4
